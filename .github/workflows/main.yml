PLIST

          # ── project.yml for xcodegen ─────────────────────────────────────
          cat > OdysseusIOS/project.yml << 'YML'
name: Odysseus
options:
  bundleIdPrefix: com.odysseus
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

targets:
  Odysseus:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: OdysseusIOS
    info:
      path: OdysseusIOS/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.odysseus.app
        PRODUCT_NAME: Odysseus
        SWIFT_VERSION: "5.9"
        IPHONEOS_DEPLOYMENT_TARGET: "15.0"
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: "NO"
        CODE_SIGNING_ALLOWED: "NO"
        SKIP_INSTALL: "NO"
        ENABLE_BITCODE: "NO"
YML

          brew install xcodegen --quiet 2>/dev/null || true
          cd OdysseusIOS && xcodegen generate

      - name: Build
        run: |
          cd OdysseusIOS
          xcodebuild \
            -project Odysseus.xcodeproj \
            -scheme Odysseus \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR="${{ github.workspace }}/build/output" \
            clean build | xcpretty

      - name: Package IPA
        run: |
          IPA_DIR="${{ github.workspace }}/build/ipa"
          mkdir -p "${IPA_DIR}/Payload"
          cp -r "${{ github.workspace }}/build/output/Odysseus.app" "${IPA_DIR}/Payload/"
          cd "${IPA_DIR}"
          zip -r "${{ github.workspace }}/build/Odysseus.ipa" Payload
          ls -lh "${{ github.workspace }}/build/Odysseus.ipa"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Odysseus-iOS-IPA
          path: build/Odysseus.ipa
          retention-days: 30

