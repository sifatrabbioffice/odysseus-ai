name: Build Odysseus iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      server_url:
        description: 'Odysseus server URL (e.g., http://192.168.1.50:7000)'
        required: false
        default: 'http://localhost:7000'

jobs:
  build-ipa:
    runs-on: macos-14  # Apple Silicon (M1/M2) রানার ব্যবহার করা হয়েছে দ্রুত বিল্ডের জন্য
    timeout-minutes: 30

    env:
      APP_NAME: Odysseus
      BUNDLE_ID: com.odysseus.app
      SCHEME: Odysseus
      SERVER_URL: ${{ github.event.inputs.server_url || 'http://localhost:7000' }}

    steps:
      # ── ১. সোর্স কোড চেকআউট ───────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── ২. XcodeGen টুল ইন্সটলেশন ──────────────────────────────────────
      - name: Install XcodeGen Tools
        run: |
          echo "Installing XcodeGen via Homebrew..."
          brew install xcodegen

      # ── ৩. আইওএস প্রোজেক্ট ডিরেক্টরি এবং সোর্স তৈরি ──────────────────────────
      - name: Generate Source Files
        run: |
          mkdir -p OdysseusIOS/OdysseusIOS
          
          # AppDelegate.swift তৈরি
          cat > OdysseusIOS/OdysseusIOS/AppDelegate.swift << 'SWIFT'
          import UIKit

          @main
          class AppDelegate: UIResponder, UIApplicationDelegate {
              var window: UIWindow?

              func application(
                  _ application: UIApplication,
                  didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
              ) -> Bool {
                  if #available(iOS 13.0, *) {
                      // SceneDelegate handles window setup in iOS 13+
                  } else {
                      window = UIWindow(frame: UIScreen.main.bounds)
                      window?.rootViewController = ViewController()
                      window?.makeKeyAndVisible()
                  }
                  return true
              }
          }
          SWIFT

          # SceneDelegate.swift তৈরি (আধুনিক iOS স্ট্যান্ডার্ডের জন্য)
          cat > OdysseusIOS/OdysseusIOS/SceneDelegate.swift << 'SWIFT'
          import UIKit

          class SceneDelegate: UIResponder, UIWindowSceneDelegate {
              var window: UIWindow?

              func scene(_ scene: UIScene, willConnectTo session: UISceneSession, options connectionOptions: UIScene.ConnectionOptions) {
                  guard let windowScene = (scene as? UIWindowScene) else { return }
                  window = UIWindow(windowScene: windowScene)
                  window?.rootViewController = ViewController()
                  window?.makeKeyAndVisible()
              }
          }
          SWIFT

          # ViewController.swift তৈরি (আপনার WebView কোডসহ)
          cat > OdysseusIOS/OdysseusIOS/ViewController.swift << 'SWIFT'
          import UIKit
          import WebKit

          class ViewController: UIViewController, WKNavigationDelegate, WKUIDelegate {
              private var webView: WKWebView!
              private var loadingView: UIView!
              private var activityIndicator: UIActivityIndicatorView!
              private var retryButton: UIButton!
              private var statusLabel: UILabel!
              
              // Environment variable থেকে রানটাইমে URL ইনজেক্ট হবে
              private let serverURL = "${{ env.SERVER_URL }}"

              override func viewDidLoad() {
                  super.viewDidLoad()
                  setupWebView()
                  setupLoadingOverlay()
                  loadOdysseus()
              }

              private func setupWebView() {
                  let config = WKWebViewConfiguration()
                  config.allowsInlineMediaPlayback = true
                  if #available(iOS 14.5, *) {
                      config.preferences.isTextInteractionEnabled = true
                  }
                  
                  webView = WKWebView(frame: view.bounds, configuration: config)
                  webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  webView.navigationDelegate = self
                  webView.uiDelegate = self
                  webView.allowsBackForwardNavigationGestures = true
                  
                  webView.backgroundColor = .black
                  webView.isOpaque = false
                  view.addSubview(webView)
              }

              private func setupLoadingOverlay() {
                  loadingView = UIView(frame: view.bounds)
                  loadingView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
                  loadingView.backgroundColor = UIColor(red: 0.05, green: 0.05, blue: 0.07, alpha: 1)

                  let titleLabel = UILabel()
                  titleLabel.text = "Odysseus"
                  titleLabel.font = UIFont.systemFont(ofSize: 28, weight: .bold)
                  titleLabel.textColor = .white
                  
                  activityIndicator = UIActivityIndicatorView(style: .large)
                  activityIndicator.color = .systemBlue
                  activityIndicator.startAnimating()

                  statusLabel = UILabel()
                  statusLabel.text = "Connecting to Workspace..."
                  statusLabel.font = UIFont.systemFont(ofSize: 14)
                  statusLabel.textColor = .lightGray
                  statusLabel.numberOfLines = 0
                  statusLabel.textAlignment = .center

                  retryButton = UIButton(type: .system)
                  retryButton.setTitle("Retry Connection", for: .normal)
                  retryButton.isHidden = true
                  retryButton.addTarget(self, action: #selector(retryTapped), for: .touchUpInside)

                  let stack = UIStackView(arrangedSubviews: [titleLabel, activityIndicator, statusLabel, retryButton])
                  stack.axis = .vertical
                  stack.spacing = 16
                  stack.alignment = .center
                  stack.translatesAutoresizingMaskIntoConstraints = false

                  loadingView.addSubview(stack)
                  view.addSubview(loadingView)

                  NSLayoutConstraint.activate([
                      stack.centerXAnchor.constraint(equalTo: loadingView.centerXAnchor),
                      stack.centerYAnchor.constraint(equalTo: loadingView.centerYAnchor),
                      stack.leadingAnchor.constraint(equalTo: loadingView.leadingAnchor, constant: 40),
                      stack.trailingAnchor.constraint(equalTo: loadingView.trailingAnchor, constant: -40)
                  ])
              }

              private func loadOdysseus() {
                  guard let url = URL(string: serverURL) else { 
                      showError(message: "Invalid Server URL format.")
                      return 
                  }
                  let request = URLRequest(url: url, cachePolicy: .useProtocolCachePolicy, timeoutInterval: 15)
                  webView.load(request)
              }

              @objc private func retryTapped() {
                  retryButton.isHidden = true
                  activityIndicator.startAnimating()
                  statusLabel.text = "Reconnecting..."
                  loadOdysseus()
              }

              func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
                  UIView.animate(withDuration: 0.4, animations: {
                      self.loadingView.alpha = 0
                  }) { _ in
                      self.loadingView.isHidden = true
                  }
              }

              func webView(_ webView: WKWebView, didFail navigation: WKNavigation!, withError error: Error) {
                  showError(message: error.localizedDescription)
              }

              func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
                  showError(message: error.localizedDescription)
              }

              private func showError(message: String) {
                  activityIndicator.stopAnimating()
                  statusLabel.text = "Failed to connect to Odysseus at:\n\(serverURL)\n\nError: \(message)"
                  retryButton.isHidden = false
                  loadingView.isHidden = false
                  loadingView.alpha = 1
              }
          }
          SWIFT

          # Info.plist তৈরি
          cat > OdysseusIOS/OdysseusIOS/Info.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.odysseus.app</string>
              <key>CFBundleName</key>
              <string>Odysseus</string>
              <key>CFBundleExecutable</key>
              <string>$(EXECUTABLE_NAME)</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleVersion</key>
              <string>1</string>
              <key>LSRequiresIPhoneOS</key>
              <true/>
              <key>NSAppTransportSecurity</key>
              <dict>
                  <key>NSAllowsArbitraryLoads</key>
                  <true/>
              </dict>
              <key>UIApplicationSceneManifest</key>
              <dict>
                  <key>UIApplicationSupportsMultipleScenes</key>
                  <false/>
                  <key>UISceneConfigurations</key>
                  <dict>
                      <key>UIWindowSceneSessionRoleApplication</key>
                      <array>
                          <dict>
                              <key>UISceneConfigurationName</key>
                              <string>Default Configuration</string>
                              <key>UISceneDelegateClassName</key>
                              <string>$(PRODUCT_MODULE_NAME).SceneDelegate</string>
                          </dict>
                      </array>
                  </dict>
              </dict>
          </dict>
          </plist>
          PLIST

      # ── ৪. XcodeGen দিয়ে প্রোজেক্ট স্ট্রাকচার জেনারেট করা ──────────────────────
      - name: Generate Xcode Project File
        run: |
          cat > OdysseusIOS/project.yml << 'YML'
          name: Odysseus
          options:
            bundleIdPrefix: com.odysseus
            deploymentTarget:
              iOS: "15.0"
          targets:
            Odysseus:
              type: application
              platform: iOS
              deploymentTarget: "15.0"
              sources:
                - path: OdysseusIOS
              info:
                path: OdysseusIOS/Info.plist
              settings:
                base:
                  PRODUCT_BUNDLE_IDENTIFIER: com.odysseus.app
                  CODE_SIGNING_ALLOWED: "NO"
                  CODE_SIGNING_REQUIRED: "NO"
                  CODE_SIGN_IDENTITY: ""
          YML
          cd OdysseusIOS
          xcodegen generate

      # ── ৫. প্রপার বিল্ড প্রসেস (আর্কাইভ ট্রিক ব্যবহার করে) ──────────────────────────
      - name: Compile and Archive App Bundle
        run: |
          cd OdysseusIOS
          xcodebuild archive \
            -project Odysseus.xcodeproj \
            -scheme Odysseus \
            -configuration Release \
            -sdk iphoneos \
            -archivePath ${{ github.workspace }}/build/Odysseus.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY=""

      # ── ৬. আইপিএ (.ipa) প্যাকেজিং ফিক্স ────────────────────────────────────
      - name: Package App Bundle into IPA File
        run: |
          mkdir -p ${{ github.workspace }}/build/Payload
          
          # xcarchive থেকে মূল .app ফোল্ডারটি পে-লোডে কপি করা হচ্ছে
          cp -r "${{ github.workspace }}/build/Odysseus.xcarchive/Products/Applications/Odysseus.app" "${{ github.workspace }}/build/Payload/"
          
          cd ${{ github.workspace }}/build
          zip -r Odysseus.ipa Payload
          
          echo "🚀 IPA সফলভাবে জেনারেট হয়েছে!"
          ls -la ${{ github.workspace }}/build/Odysseus.ipa

      # ── ৭. আর্টফ্যাক্ট আপলোড (এখানেই আপনার আইপিএ ফাইল জমা থাকবে) ────────────────
      - name: Upload Finished IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Odysseus-iOS-App
          path: ${{ github.workspace }}/build/Odysseus.ipa
          retention-days: 7
