
name: Build Odysseus iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-ipa:
    runs-on: macos-latest
    timeout-minutes: 40

    steps:
      - name: Checkout Odysseus
        uses: actions/checkout@v4
        with:
          repository: pewdiepie-archdaemon/odysseus
          path: odysseus-src

      - name: Generate Xcode project
        run: |
          mkdir -p OdysseusIOS/OdysseusIOS

          # ── AppDelegate.swift ────────────────────────────────────────────
          cat > OdysseusIOS/OdysseusIOS/AppDelegate.swift << 'SWIFT'
import UIKit

@main
class AppDelegate: UIResponder, UIApplicationDelegate {
    var window: UIWindow?

    func application(
        _ application: UIApplication,
        didFinishLaunchingWithOptions launchOptions: [UIApplication.LaunchOptionsKey: Any]?
    ) -> Bool {
        window = UIWindow(frame: UIScreen.main.bounds)
        window?.rootViewController = ViewController()
        window?.makeKeyAndVisible()
        return true
    }
}
SWIFT

          # ── ViewController.swift ─────────────────────────────────────────
          cat > OdysseusIOS/OdysseusIOS/ViewController.swift << 'SWIFT'
import UIKit
import WebKit

class ViewController: UIViewController, WKNavigationDelegate, WKUIDelegate {

    private var webView: WKWebView!
    private var loadingView: UIView!
    private var activityIndicator: UIActivityIndicatorView!
    private var retryButton: UIButton!
    private var statusLabel: UILabel!
    private var settingsButton: UIButton!

    private let defaults = UserDefaults.standard
    private let urlKey = "odysseus_server_url"

    private var serverURL: String {
        get { defaults.string(forKey: urlKey) ?? "" }
        set { defaults.set(newValue, forKey: urlKey) }
    }

    override func viewDidLoad() {
        super.viewDidLoad()
        setupWebView()
        setupLoadingOverlay()
        setupSettingsButton()

        if serverURL.isEmpty {
            showURLSetup(firstTime: true)
        } else {
            loadOdysseus()
        }
    }

    // MARK: – WebView

    private func setupWebView() {
        let config = WKWebViewConfiguration()
        config.allowsInlineMediaPlayback = true
        config.mediaTypesRequiringUserActionForPlayback = []
        let prefs = WKWebpagePreferences()
        prefs.allowsContentJavaScript = true
        config.defaultWebpagePreferences = prefs

        webView = WKWebView(frame: view.bounds, configuration: config)
        webView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
        webView.navigationDelegate = self
        webView.uiDelegate = self
        webView.allowsBackForwardNavigationGestures = true
        webView.scrollView.contentInsetAdjustmentBehavior = .automatic
        view.addSubview(webView)
    }

    // MARK: – Settings Button (top right gear icon)

    private func setupSettingsButton() {
        settingsButton = UIButton(type: .system)
        let img = UIImage(systemName: "gearshape.fill")
        settingsButton.setImage(img, for: .normal)
        settingsButton.tintColor = .white.withAlphaComponent(0.7)
        settingsButton.translatesAutoresizingMaskIntoConstraints = false
        settingsButton.addTarget(self, action: #selector(showURLSetupTapped), for: .touchUpInside)
        view.addSubview(settingsButton)
        NSLayoutConstraint.activate([
            settingsButton.topAnchor.constraint(equalTo: view.safeAreaLayoutGuide.topAnchor, constant: 12),
            settingsButton.trailingAnchor.constraint(equalTo: view.trailingAnchor, constant: -16),
            settingsButton.widthAnchor.constraint(equalToConstant: 36),
            settingsButton.heightAnchor.constraint(equalToConstant: 36)
        ])
    }

    // MARK: – Loading Overlay

    private func setupLoadingOverlay() {
        loadingView = UIView(frame: view.bounds)
        loadingView.autoresizingMask = [.flexibleWidth, .flexibleHeight]
        loadingView.backgroundColor = UIColor(red: 0.1, green: 0.1, blue: 0.12, alpha: 1)

        let titleLabel = UILabel()
        titleLabel.text = "Odysseus"
        titleLabel.font = UIFont.systemFont(ofSize: 32, weight: .bold)
        titleLabel.textColor = .white
        titleLabel.textAlignment = .center
        titleLabel.translatesAutoresizingMaskIntoConstraints = false

        let subtitleLabel = UILabel()
        subtitleLabel.text = "Self-hosted AI workspace"
        subtitleLabel.font = UIFont.systemFont(ofSize: 15)
        subtitleLabel.textColor = UIColor.white.withAlphaComponent(0.5)
        subtitleLabel.textAlignment = .center
        subtitleLabel.translatesAutoresizingMaskIntoConstraints = false

        activityIndicator = UIActivityIndicatorView(style: .large)
        activityIndicator.color = .white
        activityIndicator.translatesAutoresizingMaskIntoConstraints = false
        activityIndicator.startAnimating()

        statusLabel = UILabel()
        statusLabel.text = "Connecting…"
        statusLabel.font = UIFont.systemFont(ofSize: 13)
        statusLabel.textColor = UIColor.white.withAlphaComponent(0.5)
        statusLabel.textAlignment = .center
        statusLabel.numberOfLines = 0
        statusLabel.translatesAutoresizingMaskIntoConstraints = false

        retryButton = UIButton(type: .system)
        retryButton.setTitle("Retry", for: .normal)
        retryButton.titleLabel?.font = UIFont.systemFont(ofSize: 16, weight: .medium)
        retryButton.translatesAutoresizingMaskIntoConstraints = false
        retryButton.isHidden = true
        retryButton.addTarget(self, action: #selector(retryTapped), for: .touchUpInside)

        let changeURLButton = UIButton(type: .system)
        changeURLButton.setTitle("Change Server URL", for: .normal)
        changeURLButton.titleLabel?.font = UIFont.systemFont(ofSize: 14)
        changeURLButton.tintColor = UIColor.white.withAlphaComponent(0.6)
        changeURLButton.translatesAutoresizingMaskIntoConstraints = false
        changeURLButton.addTarget(self, action: #selector(showURLSetupTapped), for: .touchUpInside)

        let stack = UIStackView(arrangedSubviews: [
            titleLabel, subtitleLabel, activityIndicator, statusLabel, retryButton, changeURLButton
        ])
        stack.axis = .vertical
        stack.spacing = 14
        stack.alignment = .center
        stack.setCustomSpacing(4, after: titleLabel)
        stack.setCustomSpacing(28, after: subtitleLabel)
        stack.translatesAutoresizingMaskIntoConstraints = false

        loadingView.addSubview(stack)
        NSLayoutConstraint.activate([
            stack.centerXAnchor.constraint(equalTo: loadingView.centerXAnchor),
            stack.centerYAnchor.constraint(equalTo: loadingView.centerYAnchor),
            stack.leadingAnchor.constraint(greaterThanOrEqualTo: loadingView.leadingAnchor, constant: 32),
            stack.trailingAnchor.constraint(lessThanOrEqualTo: loadingView.trailingAnchor, constant: -32)
        ])

        view.addSubview(loadingView)
        view.bringSubviewToFront(settingsButton)
    }

    // MARK: – URL Setup Dialog

    @objc private func showURLSetupTapped() {
        showURLSetup(firstTime: false)
    }

    private func showURLSetup(firstTime: Bool) {
        let title = firstTime ? "Welcome to Odysseus" : "Change Server URL"
        let message = "Enter the IP address of your computer running Odysseus.\n\nExample:\nhttp://192.168.1.100:7000\n\nMake sure your phone and computer are on the same Wi-Fi network."

        let alert = UIAlertController(title: title, message: message, preferredStyle: .alert)
        alert.addTextField { field in
            field.placeholder = "http://192.168.1.100:7000"
            field.text = self.serverURL
            field.keyboardType = .URL
            field.autocorrectionType = .no
            field.autocapitalizationType = .none
            field.clearButtonMode = .always
        }

        let connectAction = UIAlertAction(title: "Connect", style: .default) { [weak self, weak alert] _ in
            guard let self = self else { return }
            var input = alert?.textFields?.first?.text?.trimmingCharacters(in: .whitespacesAndNewlines) ?? ""
            // Auto-add http:// if missing
            if !input.isEmpty && !input.hasPrefix("http") {
                input = "http://" + input
            }
            // Auto-add :7000 if no port specified and it's a plain IP
            if !input.isEmpty {
                self.serverURL = input
                self.loadingView.isHidden = false
                self.loadingView.alpha = 1
                self.activityIndicator.startAnimating()
                self.statusLabel.text = "Connecting to \(input)…"
                self.retryButton.isHidden = true
                self.loadOdysseus()
            }
        }

        alert.addAction(connectAction)
        if !firstTime {
            alert.addAction(UIAlertAction(title: "Cancel", style: .cancel))
        }
        alert.preferredAction = connectAction
        present(alert, animated: true)
    }

    // MARK: – Load

    private func loadOdysseus() {
        guard let url = URL(string: serverURL) else {
            showURLSetup(firstTime: true)
            return
        }
        let request = URLRequest(url: url, cachePolicy: .reloadIgnoringLocalCacheData, timeoutInterval: 15)
        webView.load(request)
    }

    @objc private func retryTapped() {
        retryButton.isHidden = true
        activityIndicator.startAnimating()
        statusLabel.text = "Connecting…"
        loadOdysseus()
    }

    // MARK: – WKNavigationDelegate

    func webView(_ webView: WKWebView, didFinish navigation: WKNavigation!) {
        UIView.animate(withDuration: 0.3) { self.loadingView.alpha = 0 }
            completion: { _ in self.loadingView.isHidden = true }
    }

    func webView(_ webView: WKWebView, didFail navigation: WKNavigation!, withError error: Error) {
        showError(error)
    }

    func webView(_ webView: WKWebView, didFailProvisionalNavigation navigation: WKNavigation!, withError error: Error) {
        showError(error)
    }

    private func showError(_ error: Error) {
        activityIndicator.stopAnimating()
        statusLabel.text = "❌ Could not connect to:\n\(serverURL)\n\nCheck your IP address and make sure Odysseus is running."
        retryButton.isHidden = false
        loadingView.isHidden = false
        loadingView.alpha = 1
    }

    // MARK: – WKUIDelegate

    func webView(_ webView: WKWebView,
                 runJavaScriptAlertPanelWithMessage message: String,
                 initiatedByFrame frame: WKFrameInfo,
                 completionHandler: @escaping () -> Void) {
        let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert)
        alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler() })
        present(alert, animated: true)
    }

    func webView(_ webView: WKWebView,
                 runJavaScriptConfirmPanelWithMessage message: String,
                 initiatedByFrame frame: WKFrameInfo,
                 completionHandler: @escaping (Bool) -> Void) {
        let alert = UIAlertController(title: nil, message: message, preferredStyle: .alert)
        alert.addAction(UIAlertAction(title: "Cancel", style: .cancel) { _ in completionHandler(false) })
        alert.addAction(UIAlertAction(title: "OK", style: .default) { _ in completionHandler(true) })
        present(alert, animated: true)
    }
}
SWIFT

          # ── Info.plist ───────────────────────────────────────────────────
          cat > OdysseusIOS/OdysseusIOS/Info.plist << 'PLIST'
<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN"
  "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
<plist version="1.0">
<dict>
    <key>CFBundleName</key><string>Odysseus</string>
    <key>CFBundleDisplayName</key><string>Odysseus</string>
    <key>CFBundleIdentifier</key><string>com.odysseus.app</string>
    <key>CFBundleVersion</key><string>2</string>
    <key>CFBundleShortVersionString</key><string>1.1</string>
    <key>CFBundleExecutable</key><string>$(EXECUTABLE_NAME)</string>
    <key>CFBundlePackageType</key><string>APPL</string>
