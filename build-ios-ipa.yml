name: Build GameHub IPA (All-in-One)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Latest Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Create Full Project Structure
        run: |
          mkdir -p GameHub/GameHub/Sources/{Input,Game,Views}
          mkdir -p GameHub/GameHub/Resources

          # ==================== Project.yml (XcodeGen) ====================
          cat > GameHub/project.yml << 'EOF'
          name: GameHub
          options:
            bundleIdPrefix: com.gamehub
            deploymentTarget:
              iOS: "17.0"
            usesTabs: false
            indentWidth: 4
            tabWidth: 4

          targets:
            GameHub:
              type: application
              platform: iOS
              deploymentTarget: "17.0"
              sources:
                - path: GameHub/Sources
                - path: GameHub/Resources
              settings:
                base:
                  CODE_SIGN_IDENTITY: ""
                  CODE_SIGNING_REQUIRED: NO
                  CODE_SIGNING_ALLOWED: NO
                  ENABLE_BITCODE: NO
              dependencies:
                - framework: GameController
                - framework: CoreHaptics
                - framework: SpriteKit
              info:
                path: GameHub/Info.plist
                properties:
                  UILaunchScreen: {}
                  UISupportedInterfaceOrientations: [UIInterfaceOrientationLandscapeLeft, UIInterfaceOrientationLandscapeRight]
          EOF

          # ==================== Info.plist ====================
          cat > GameHub/GameHub/Info.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>
              <string>com.gamehub.GameHub</string>
              <key>CFBundleName</key>
              <string>GameHub</string>
              <key>CFBundleVersion</key>
              <string>1.0</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0</string>
              <key>CFBundleExecutable</key>
              <string>GameHub</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
          </dict>
          </plist>
          EOF

          # ==================== ControllerInput.swift ====================
          cat > GameHub/GameHub/Sources/Input/ControllerInput.swift << 'SWIFT'
          import GameController
          import CoreHaptics
          import Combine

          class ControllerInput: ObservableObject {
              static let shared = ControllerInput()
              
              @Published var leftStick: CGPoint = .zero
              @Published var rightStick: CGPoint = .zero
              @Published var pressedButtons: Set<String> = []
              
              private var hapticEngine: CHHapticEngine?
              private var gcController: GCVirtualController?
              private var cancellables = Set<AnyCancellable>()
              
              private init() {
                  setupHaptics()
                  setupVirtualController()
              }
              
              private func setupVirtualController() {
                  let config = GCVirtualController.Configuration()
                  config.elements = [
                      GCInputLeftThumbstick, GCInputRightThumbstick,
                      GCInputButtonA, GCInputButtonB, GCInputButtonX, GCInputButtonY,
                      GCInputLeftShoulder, GCInputRightShoulder,
                      GCInputLeftTrigger, GCInputRightTrigger
                  ]
                  gcController = GCVirtualController(configuration: config)
                  gcController?.connect()
              }
              
              private func setupHaptics() {
                  guard CHHapticEngine.capabilitiesForHardware().supportsHaptics else { return }
                  do {
                      hapticEngine = try CHHapticEngine()
                      try hapticEngine?.start()
                  } catch {}
              }
              
              func triggerButtonHaptic(intensity: Float = 0.7) {
                  guard let engine = hapticEngine else { return }
                  let event = CHHapticEvent(
                      eventType: .hapticTransient,
                      parameters: [
                          CHHapticEventParameter(parameterID: .hapticIntensity, value: intensity),
                          CHHapticEventParameter(parameterID: .hapticSharpness, value: 0.5)
                      ],
                      relativeTime: 0
                  )
                  do {
                      let pattern = try CHHapticPattern(events: [event], parameters: [])
                      let player = try engine.makePlayer(with: pattern)
                      try player.start(atTime: CHHapticTimeImmediate)
                  } catch {}
              }
              
              func xinputToWineVK(_ button: String) -> UInt32 {
                  let map: [String: UInt32] = [
                      "Cross": 0x58, "Circle": 0x42, "Square": 0x41, "Triangle": 0x59,
                      "L1": 0x51, "R1": 0x45, "L2": 0x4C, "R2": 0x52,
                  ]
                  return map[button] ?? 0
              }
          }
          SWIFT

          # ==================== GameScene.swift ====================
          cat > GameHub/GameHub/Sources/Game/GameScene.swift << 'SWIFT'
          import SpriteKit
          import Combine

          class GameScene: SKScene {
              let controller = ControllerInput.shared
              private var player: SKSpriteNode!
              private var cancellables = Set<AnyCancellable>()
              
              override func didMove(to view: SKView) {
                  backgroundColor = .black
                  scaleMode = .resizeFill
                  
                  player = SKSpriteNode(color: .systemBlue, size: CGSize(width: 60, height: 60))
                  player.position = CGPoint(x: frame.midX, y: frame.midY)
                  addChild(player)
                  
                  // Controller binding
                  controller.$leftStick
                      .sink { [weak self] stick in
                          guard let self = self else { return }
                          self.player.position.x += stick.x * 8
                          self.player.position.y += stick.y * 8
                      }
                      .store(in: &cancellables)
              }
              
              override func update(_ currentTime: TimeInterval) {
                  // Add more game logic here
              }
          }
          SWIFT

          # ==================== GameHubApp.swift ====================
          cat > GameHub/GameHub/Sources/Views/GameHubApp.swift << 'SWIFT'
          import SwiftUI
          import SpriteKit

          @main
          struct GameHubApp: App {
              var body: some Scene {
                  WindowGroup {
                      ContentView()
                  }
              }
          }

          struct ContentView: View {
              var scene: SKScene {
                  let scene = GameScene(size: CGSize(width: 1280, height: 720))
                  scene.scaleMode = .fill
                  return scene
              }
              
              var body: some View {
                  SpriteView(scene: scene, options: [.allowsTransparency])
                      .ignoresSafeArea()
                      .onAppear {
                          ControllerInput.shared.gcController?.connect()
                      }
              }
          }
          SWIFT

      - name: Generate Xcode Project
        run: |
          cd GameHub
          xcodegen generate

      - name: Build & Archive
        run: |
          cd GameHub
          xcodebuild clean archive \
            -project GameHub.xcodeproj \
            -scheme GameHub \
            -archivePath ./build/GameHub.xcarchive \
            -sdk iphoneos \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd GameHub
          cat > ExportOptions.plist << 'EOP'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>ad-hoc</string>
              <key>teamID</key>
              <string></string>
          </dict>
          </plist>
          EOP
          
          xcodebuild -exportArchive \
            -archivePath ./build/GameHub.xcarchive \
            -exportOptionsPlist ./ExportOptions.plist \
            -exportPath ./build

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: GameHub-IPA
          path: GameHub/build/GameHub.ipa
